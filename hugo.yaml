baseURL: "https://petersouter.xyz/"
languageCode: "en-uk"
defaultContentLanguage: "en-uk"
title: "Angels && Daemons - https://petersouter.xyz"
theme: "anatole"
summarylength: 10
enableEmoji: true
enableRobotsTXT: true
pagination:
  pagerSize: 5
ignoreLogs:
  - warning-goldmark-raw-html

services:
  disqus:
    shortname: "petersouter"

permalinks:
  post: "/:title/"
  page: "/:title/"

taxonomies:
  tag: "tags"
  category: "categories"

params:
  title: "Angels && Daemons"
  author: "Peter Souter"
  description: "Tech blog by Peter Souter - Just some guy y'know?"
  profilePicture: "images/profile.jpg"
  favicon: "favicons/"
  mainSections:
    - "post"
  singleDateFormat: "2/1/2006"
  indexDateFormat: "2/1/2006"
  listDateFormat: "2/1/2006"
  readMore: true
  reversepagetitle: true
  doNotLoadAnimations: false
  socialIcons:
    - icon: "fa-brands fa-github"
      title: "GitHub"
      url: "https://github.com/petems"
    - icon: "fa-brands fa-linkedin"
      title: "LinkedIn"
      url: "https://www.linkedin.com/in/peter-souter-7bb67a38/"
    - icon: "fa-brands fa-bluesky"
      title: "Bluesky"
      url: "https://bsky.app/profile/petersouter.xyz"
    - icon: "fa-brands fa-twitter"
      title: "Twitter"
      url: "https://twitter.com/petersouter"
    - icon: "fa-solid fa-rss"
      title: "RSS"
      url: "/feed.xml"

menu:
  main:
    - identifier: "home"
      name: "Home"
      url: "/"
      weight: 100
    - identifier: "posts"
      name: "Posts"
      url: "/post/"
      weight: 200
    - identifier: "categories"
      name: "Categories"
      url: "/categories/"
      weight: 300
    - identifier: "tags"
      name: "Tags"
      url: "/tags/"
      weight: 400
    - identifier: "talks"
      name: "Talks"
      url: "/talks/"
      weight: 500
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 600

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    style: "monokai"
    noClasses: true
  goldmark:
    renderer:
      unsafe: true

mediaTypes:
  text/markdown:
    suffixes:
      - "md"

outputFormats:
  RSS:
    baseName: "feed"
  Markdown:
    mediaType: "text/markdown"
    isPlainText: true
    isHTML: false
    baseName: "index"
    rel: "alternate"
  TXT:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true

outputs:
  home:
    - "HTML"
    - "RSS"
    - "TXT"
  page:
    - "HTML"
    - "Markdown"
