baseURL: "https://petersouter.xyz/"
languageCode: "en-uk"
defaultContentLanguage: "en-uk"
title: "Angels && Daemons"
theme: "hugo-theme-cleanwhite"
pagination:
    pagerSize: 5
ignoreLogs:
    - warning-goldmark-raw-html

services:
    disqus:
        shortname: "petersouter"

permalinks:
    post: "/:title/"
    page: "/:title/"

taxonomies:
    tag: "tags"
    category: "categories"

params:
    header_image: "img/home-bg.jpg"
    SEOTitle: "Angels && Daemons | petersouter.xyz"
    description: "A blog by Peter Souter"
    slogan: "Just some guy y'know?"
    image_404: "img/404-bg.jpg"
    title_404: "Page not found :("
    omit_categories: true
    auto_theme: true
    dark_mode_toggle: true

    sidebar_about_description: "Tech blog by Peter Souter - Just some guy y'know?"
    sidebar_avatar: "img/avatar.jpg"

    featured_tags: true
    featured_condition_size: 1

    about_me: true

    social:
        rss: true
        email: "peter@petersouter.co.uk"
        github: "https://github.com/petems"
        linkedin: "https://www.linkedin.com/in/peter-souter-7bb67a38/"
        twitter: "https://twitter.com/petersouter"
        mastodon: "https://bsky.app/profile/petersouter.xyz"

    additional_menus:
        - title: "ARCHIVE"
          href: "/archives/"
        - title: "GARDEN"
          href: "/garden/"
        - title: "TALKS"
          href: "/talks/"
        - title: "ABOUT"
          href: "/about/"

markup:
    highlight:
        codeFences: true
        guessSyntax: true
        style: "dracula"
        noClasses: true
    goldmark:
        renderer:
            unsafe: true
    tableOfContents:
        endLevel: 2
        startLevel: 1

mediaTypes:
    text/markdown:
        suffixes:
            - "md"

outputFormats:
    RSS:
        baseName: "feed"
    Markdown:
        mediaType: "text/markdown"
        isPlainText: true
        isHTML: false
        baseName: "index"
        rel: "alternate"
    TXT:
        mediaType: "text/plain"
        baseName: "llms"
        isPlainText: true

outputs:
    home:
        - "HTML"
        - "RSS"
        - "TXT"
    page:
        - "HTML"
        - "Markdown"
